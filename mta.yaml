_schema-version: "3.2"
ID: harmanpoc
version: 0.0.1
modules:
- name: harmanpoc-destination-content
  type: com.sap.application.content
  requires:
  - name: harmanpoc-destination-service
    parameters:
      content-target: true
  - name: harmanpoc_html_repo_host
    parameters:
      service-key:
        name: harmanpoc_html_repo_host-key
  - name: uaa_harmanpoc
    parameters:
      service-key:
        name: uaa_harmanpoc-key
  parameters:
    content:
      instance:
        destinations:
        - Name: harmanpoc_harmanpoc_html_repo_host
          ServiceInstanceName: harmanpoc-html5-app-host-service
          ServiceKeyName: harmanpoc_html_repo_host-key
          sap.cloud.service: harmanpoc
        - Authentication: OAuth2UserTokenExchange
          Name: harmanpoc_uaa_harmanpoc
          ServiceInstanceName: harmanpoc-xsuaa-service
          ServiceKeyName: uaa_harmanpoc-key
          sap.cloud.service: harmanpoc
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: harmanpoc-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: harmanpoc_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comsappocompare.zip
      name: comsappocompare
      target-path: resources/
- name: comsappocompare
  type: html5
  path: pocompare
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: harmanpoc-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: harmanpoc-destination-service
    service-plan: lite
- name: harmanpoc_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: harmanpoc-html5-app-host-service
    service-plan: app-host
- name: uaa_harmanpoc
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: harmanpoc-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
